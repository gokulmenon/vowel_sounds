<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vowel Sounds Practice</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js" integrity="sha384-OLBgp1GsljhM2TJ+sbHjaiH9txEUvgdDTAzHv2P24donTt6/529l+9Ua0vFImLlb" crossorigin="anonymous"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Comic Sans MS', 'Chalkboard SE', 'Arial Rounded MT Bold', cursive, sans-serif;
      background: linear-gradient(135deg, #fff9c4 0%, #e1f5fe 50%, #fce4ec 100%);
      min-height: 100vh;
      padding: 8px 16px 16px;
    }

    header {
      text-align: center;
      padding: 8px 16px 8px;
    }

    header h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      color: #c2185b;
      text-shadow: 2px 2px 0 #f8bbd0;
      letter-spacing: 1px;
    }

    .daily-reminder {
      display: inline-block;
      margin-top: 10px;
      background: #fffde7;
      border: 3px solid #ffd600;
      border-radius: 20px;
      padding: 8px 20px;
      font-size: clamp(0.9rem, 2.5vw, 1.2rem);
      color: #e65100;
      font-weight: bold;
    }

    /* ── Audio Button ───────────────────────────────────────── */
    .audio-section {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 12px auto;
    }

    .audio-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 18px 36px;
      font-size: clamp(1.1rem, 3.5vw, 1.6rem);
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,0.25);
      transition: transform 0.1s, box-shadow 0.1s;
      letter-spacing: 0.5px;
    }

    .audio-btn:active {
      transform: scale(0.96);
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    }

    #play-btn {
      background: linear-gradient(145deg, #43a047, #1b5e20);
    }

    #play-btn.playing {
      background: linear-gradient(145deg, #e53935, #b71c1c);
    }

    .audio-btn .btn-icon {
      font-size: 1.5em;
      line-height: 1;
    }

    #reset-btn {
      background: linear-gradient(145deg, #1e88e5, #0d47a1);
    }

    /* ── Chart Section ─────────────────────────────────────── */
    .chart-section {
      max-width: 900px;
      margin: 0 auto 32px;
    }

    .vowel-chart-img {
      display: block;
      width: 100%;
      max-width: 860px;
      height: auto;
      margin: 0 auto;
      border-radius: 16px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.18);
    }

    footer {
      text-align: center;
      padding: 16px;
      color: #888;
      font-size: 0.8rem;
    }

    /* ── Responsive ────────────────────────────────────────── */
    @media (max-width: 500px) {
      .vowel-chart-img {
        border-radius: 8px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>🌟 Vowel Sounds Practice 🌟</h1>
    <div class="daily-reminder">Time to practice your vowel sounds! 🎉</div>
  </header>

  <!-- Audio Button -->
  <div class="audio-section">
    <button id="play-btn" class="audio-btn" aria-label="Play vowel sounds">
      <span class="btn-icon" id="btn-icon">▶</span>
      <span id="btn-label">Play the Sounds</span>
    </button>
    <button id="reset-btn" class="audio-btn" aria-label="Restart from beginning">
      <span class="btn-icon">↺</span>
      <span>Restart</span>
    </button>
  </div>

  <audio id="audio" src="res/vowel-sounds.mp3" preload="none"></audio>

  <!-- Vowel Chart -->
  <section class="chart-section">
    <img class="vowel-chart-img" src="res/vowel-chart.png" alt="Vowel sounds chart with 24 vowel patterns and clipart pictures for daily practice" />
  </section>

  <footer>Made with ❤️ for daily vowel sound practice</footer>

  <script>
    // ── Audio Controls ───────────────────────────────────────
    const audio    = document.getElementById('audio');
    const btn      = document.getElementById('play-btn');
    const resetBtn = document.getElementById('reset-btn');
    const icon     = document.getElementById('btn-icon');
    const label    = document.getElementById('btn-label');

    // ── Confetti helpers ─────────────────────────────────────
    let confettiRaf = null;

    function stopConfetti() {
      if (confettiRaf !== null) {
        cancelAnimationFrame(confettiRaf);
        confettiRaf = null;
        confetti.reset();
      }
    }

    // ── Button handlers ──────────────────────────────────────
    btn.addEventListener('click', () => {
      if (audio.paused) {
        // If audio finished naturally, reset to start before replaying
        if (audio.ended) audio.currentTime = 0;
        stopConfetti();
        audio.play();
      } else {
        audio.pause();
      }
    });

    resetBtn.addEventListener('click', () => {
      stopConfetti();
      audio.pause();
      audio.currentTime = 0;
      audio.play();
    });

    // ── Audio event listeners ────────────────────────────────
    audio.addEventListener('play', () => {
      btn.classList.add('playing');
      icon.textContent  = '⏸';
      label.textContent = 'Pause';
    });

    audio.addEventListener('pause', () => {
      btn.classList.remove('playing');
      icon.textContent  = '▶';
      label.textContent = 'Play the Sounds';
    });

    audio.addEventListener('ended', () => {
      btn.classList.remove('playing');
      icon.textContent  = '▶';
      label.textContent = 'Play the Sounds';

      // 🎉 Celebrate finishing the daily exercise!
      const end = Date.now() + 3000;
      function frame() {
        confetti({ particleCount: 6, angle: 60,  spread: 55, origin: { x: 0 } });
        confetti({ particleCount: 6, angle: 120, spread: 55, origin: { x: 1 } });
        if (Date.now() < end) {
          confettiRaf = requestAnimationFrame(frame);
        } else {
          confettiRaf = null;
        }
      }
      confettiRaf = requestAnimationFrame(frame);
    });
  </script>
</body>
</html>
